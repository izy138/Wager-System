name: ante

services:
  api:
    build:
      context: .
      target: development
    ports:
      - '${API_PORT:-8080}:8080'
    env_file: .env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/ante_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    profiles: ['api']
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ante_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ante_db']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  pgdata: {}

networks:
  app-network:
    driver: bridge
